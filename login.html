<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail</title>

    <link rel="icon" type="image/x-icon" href="../../assests/images/Google logo.png">

    <style>
        body{
            background-color: #f0f4f9;
        }
        #parent{
            width: 75%;
            height:400px;
            background-color: white;
            margin: 150px auto;
            border-radius: 20px;
        }
        .child{
            width: 50%;
            height: 100%;
            float: left;
        }
        #google_logo{
            width: 40px;
            margin-left: 40px;
            margin-top: 40px
        }
        #signin_heading{
            font-size: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: normal;
            margin-left: 40px;
            margin-top: 10px;
        }
        #statement{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-left: 40px;
            margin-top: -20px;
        }
        fieldset{
            width: 450px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 100px;
            border-color: royalblue ;
            color: blue;
            border-radius: 5px;
        }
        input{
            width: 450px;
            height: 30px;
            border: transparent;
            outline: none;
            font-size: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #left_para{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 30px;
        }
        #left_para2{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: -15px;
            color: #0b57d0;
        }
        #forgot{
            height: 30px;
            border-radius: 8px;
            margin-top: 5px;
            border: transparent;
            background-color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #0b57d0;
            font-weight: 500;
        }
        #forgot:hover{
            background-color: rgb(230, 249, 255);
        }
        .button_div{
            width: 50%;
            float: right;
        }
        #Create_button{
            width: 50%;
            height: 40px;
            margin-top: 20px;
            border-radius: 20px;
            border: none;
            background-color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-right: 200px;
            color: #0b57d0;
            font-weight: bold;
        }
        #Create_button:hover{
            background-color: rgb(230, 249, 255);
        }
        #next_button{
            width: 75px;
            height: 40px;
            float: right;
            margin-top: -40px;
            margin-right: 40px;
            border-radius: 20px;
            background-color: #0b57d0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            border: none;
        }
        #next_button:hover{
            background-color: darkblue;
        }
        #languages{
            width: 200px;
            height: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background-color: #f0f4f9;
        }
        .option{
            background-color: #f0f4f9;
        }
        #languages:hover{
            background-color: rgb(217, 217, 217);
        }
        .three_button_division{
            float: right;
            margin-top: 15px;
        }
        .three_buttons{
            border: none;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f9;
        }
        #Help,#Privacy{
            margin-right: 8px;
        }
        .three_buttons:hover{
            background-color: rgb(217, 217, 217);
        }
    </style>
</head>

<body>
    <div id="parent">
        <div id="left_child" class="child">
            <img src="https://tse4.mm.bing.net/th/id/OIP.HgH-NjiOdFOrkmwjsZCCfAHaHl?rs=1&pid=ImgDetMain&o=7&rm=3" alt="" id="google_logo">
            <h1 id="signin_heading">Sign in</h1>
            <p id="statement">Use your google account</p>
        </div>

        <div id="right_child" class="child">
            <fieldset>
                <legend id="legend">Email or phone</legend>
                <form id="form">
                    <input type="text" id="input_box">
                </form>
            </fieldset>

            <button id="forgot">Forgot email?</button>

            <p id="left_para">
                Not your computer? Use Guest mode to sign in privately.
                <p id="left_para2">Learn more about using Guest mode</p>
            </p>

            <div id="button_division" class="button_div">
                <button id="Create_button">Create account</button>
                <button id="next_button">Next</button>
            </div>
        </div>
    </div>

    <select name="Languages" id="languages">
        <option class="option">English (United States)</option>
        <option class="option">English (United Kingdom)</option>
        <option class="option">Spanish</option>
        <option class="option">Italian</option>
        <option class="option">తెలుగు</option>
    </select>

    <div id="buttons_division" class="three_button_division">
        <button id="Help" class="three_buttons">Help</button>
        <button id="Privacy" class="three_buttons">Privacy</button>
        <button id="Terms" class="three_buttons">Terms</button>
    </div>
</body>
</html>
